name: sync_template

on:
  schedule:
    - cron: 0 3 * * 1
  workflow_dispatch:

permissions:
  contents: write
  pull-requests: write

jobs:
  sync_template:
    if: github.repository != 'jiozhaoyue/tavern_helper_template'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Use Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Sync template files
        run: pnpm template:sync:ci

      - name: Create template sync pull request
        uses: peter-evans/create-pull-request@v7
        with:
          title: '[bot] 同步模板仓库的更新'
          commit-message: '[bot] bump template repository update'
          branch: bot/sync-template
          delete-branch: true
